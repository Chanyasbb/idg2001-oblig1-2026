# docker-compose.yml — Assignment 2: full multi-service stack
# Run with: docker compose up --build
#
# For Assignment 1 only (local dev), just run uvicorn directly:
#   cd olympics_api && uvicorn app.main:app --reload

version: "3.9"

services:

  # ── Main API (Assignment 1 core) ────────────────────────────────────────────
  main_api:
    build: ./olympics_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./olympics.db
      - CACHE_URL=http://cache:8001
      - LOGGER_URL=http://logger:8002
      - RATE_LIMITER_URL=http://rate_limiter:8003
      - TOKEN_SHOP_URL=http://token_shop:8004
    volumes:
      - olympic_data:/app/data   # mounts the CSV dataset
    depends_on:
      - cache
      - logger
      - rate_limiter
      - token_shop

  # ── Cache ────────────────────────────────────────────────────────────────────
  cache:
    build: ./services/cache
    ports:
      - "8001:8000"
    # No volumes needed — cache is in-memory only

  # ── Logger ───────────────────────────────────────────────────────────────────
  logger:
    build: ./services/logger
    ports:
      - "8002:8000"
    environment:
      - LOG_DIR=/logs
    volumes:
      - log_data:/logs            # persist logs across restarts

  # ── Rate Limiter ─────────────────────────────────────────────────────────────
  rate_limiter:
    build: ./services/rate_limiter
    ports:
      - "8003:8000"
    # In-memory only — resets on restart (acceptable for this assignment)

  # ── Token Shop ───────────────────────────────────────────────────────────────
  token_shop:
    build: ./services/token_shop
    ports:
      - "8004:8000"
    # TODO: persist codes to a file/volume if you want them to survive restarts

  # ── Versioning Proxy ─────────────────────────────────────────────────────────
  versioning:
    build: ./services/versioning
    ports:
      - "80:8000"                 # public-facing entry point
    environment:
      - CACHE_URL=http://cache:8001
      - MAIN_API_URL=http://main_api:8000
    depends_on:
      - main_api
      - cache

volumes:
  olympic_data:   # shared CSV dataset
  log_data:       # persisted log files
