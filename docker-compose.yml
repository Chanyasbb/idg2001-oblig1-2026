# docker-compose.yml — Assignment 2: full multi-service stack
# Run with: docker compose up --build
#
# Assignment 1 only (no services):
#   cd olympics_api && uvicorn app.main:app --reload

services:

  # ── Main API ─────────────────────────────────────────────────────────────────
  main_api:
    build: ./olympics_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./olympics.db
      - CACHE_URL=http://cache:8001
      - LOGGER_URL=http://logger:8002
      - RATE_LIMITER_URL=http://rate_limiter:8003
      - TOKEN_SHOP_URL=http://token_shop:8004
    volumes:
      # Bind-mount the data folder so the CSV is accessible without rebuilding
      - ./olympics_api/data:/app/data
    depends_on:
      - cache
      - logger
      - rate_limiter
      - token_shop

  # ── Cache — in-memory GET response cache (1-minute TTL) ──────────────────────
  cache:
    build: ./services/cache
    ports:
      - "8001:8000"

  # ── Logger — buffers requests to date-rotated CSV files ──────────────────────
  logger:
    build: ./services/logger
    ports:
      - "8002:8000"
    environment:
      - LOG_DIR=/logs
    volumes:
      - log_data:/logs

  # ── Rate Limiter — sliding-window delay per user (resets on restart) ─────────
  rate_limiter:
    build: ./services/rate_limiter
    ports:
      - "8003:8000"

  # ── Token Shop — one-time purchase codes, prevents double-spending ────────────
  token_shop:
    build: ./services/token_shop
    ports:
      - "8004:8000"

  # ── Versioning Proxy — public entry point, routes to the correct API version ──
  versioning:
    build: ./services/versioning
    ports:
      - "80:8000"
    environment:
      - CACHE_URL=http://cache:8001
      - MAIN_API_URL=http://main_api:8000
    depends_on:
      - main_api
      - cache

volumes:
  log_data:   # persisted log files across container restarts
